{% extends "base.html" %}

{% block title %}公告通知 - GPT Team 管理系统{% endblock %}

{% block content %}
<div class="workspace-page">
    <div class="page-header">
        <div class="page-header-copy">
            <div class="page-header-kicker">
                <i data-lucide="megaphone"></i>
                <span>Announcement Hub</span>
            </div>
            <h2>公告通知中心</h2>
            <div class="page-header-meta">
                <span class="page-meta-pill"><i data-lucide="bell-ring"></i><span>{% if announcement_enabled %}已启用弹窗{% else %}当前未启用{% endif %}</span></span>
                <span class="page-meta-pill"><i data-lucide="file-text"></i><span>支持 Markdown</span></span>
                <a class="page-meta-pill text-link" href="/admin/settings#settings-ui-theme"><i data-lucide="settings-2"></i><span>返回系统中心</span></a>
            </div>
        </div>
    </div>

    <div class="content-section">
        <form id="announcementForm" class="settings-form">
            <div class="form-group">
                <label for="announcementEnabled" style="display:flex;align-items:center;gap:0.5rem;">
                    <input type="checkbox" id="announcementEnabled" {% if announcement_enabled %}checked{% endif %}>
                    启用兑换页公告弹窗
                </label>
            </div>

            <div class="form-group">
                <label for="announcementMarkdown">公告内容（Markdown）</label>
                <textarea id="announcementMarkdown" class="form-control" rows="14" placeholder="# 系统公告\n\n- 支持 **Markdown**\n- 支持 [链接](https://example.com)\n- 支持列表">{{ announcement_markdown or '' }}</textarea>
                <small class="form-text">留空则不展示弹窗。</small>
            </div>

            <button type="submit" class="btn btn-primary">保存公告</button>
        </form>

    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('announcementForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const enabled = document.getElementById('announcementEnabled').checked;
    const markdown = document.getElementById('announcementMarkdown').value;

    try {
        const response = await fetch('/admin/announcement', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled, markdown })
        });

        const data = await response.json();
        if (response.ok && data.success) {
            showToast('公告保存成功', 'success');
        } else {
            showToast(data.error || '保存失败', 'error');
        }
    } catch (error) {
        showToast('网络错误', 'error');
    }
});
</script>
{% endblock %}
